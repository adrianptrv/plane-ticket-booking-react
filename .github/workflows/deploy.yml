name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VITE_SUPABASE_FLIGHTS_URL: ${{ secrets.SUPABASE_FLIGHTS_URL }}
      VITE_SUPABASE_AIRPORTS_URL: ${{ secrets.SUPABASE_AIRPORTS_URL }}
      VITE_SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
